<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Showcase | masalora</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg bg-light">
    <div class="container">

      <a class="navbar-brand" href="#">masalora</a>

      <div class="collapse navbar-collapse">
        <ul class="navbar-nav ms-auto">

          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>

          <li class="nav-item">
            <a class="nav-link" href="about.html">About</a>
          </li>

          <li class="nav-item">
            <a class="nav-link active" href="showcase.html">Showcase</a>
          </li>

        </ul>
      </div>

    </div>
  </nav>

  <!-- Title -->
  <section class="container text-center py-5">

    <h1>Indian Street Food Collection</h1>

    <p>Explore foods from different regions of India.</p>

  </section>

  <!-- Filter Buttons -->
  <section class="container text-center mb-4">

    <button class="btn btn-outline-dark">All</button>

    <button class="btn btn-outline-dark">North India</button>

    <button class="btn btn-outline-dark">South India</button>

    <button class="btn btn-outline-dark">East India</button>

    <button class="btn btn-outline-dark">West India</button>

  </section>

  <!-- CARD GRID -->
  <section class="container">

    <div class="row" id="card-container">

      <!-- JavaScript will generate cards here -->

    </div>

  </section>

  <!-- MODAL -->
  <div class="modal fade" id="foodModal">

    <div class="modal-dialog modal-lg">

      <div class="modal-content">

        <div class="modal-header">

          <h5 class="modal-title">Food Name</h5>

          <button class="btn-close" data-bs-dismiss="modal"></button>

        </div>

        <div class="modal-body">

          <img src="https://placehold.co/600x400"
               class="img-fluid mb-3">

          <p>Food details appear here.</p>

        </div>

      </div>

    </div>

  </div>

  <script src="script.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
